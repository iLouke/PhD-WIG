# ======================================================================
# UVLM Master Configuration File
# ======================================================================
# Controls global simulation settings and points to vehicle-specific files.

[logger]
enabled = .true.
# 0=DEBUG, 1=INFO, 2=WARN, 3=ERROR
level = 0
file = simulation.log
console = .true.

[plotter]
enabled = .true.
format = png
output_dir = output

[solver]
# Global simulation time [s]
time = 10.0
# Global communication time step between physical domains
dt_global = 0.05 
# Time step sizes for each solver component
dt_aero = 0.05
dt_hydro = 0.05
dt_struct = 0.05
# Convergence criteria for iterative solvers
conv_aero = 1.0e-4
conv_hydro = 1.0e-4
conv_struct = 1.0e-4
# Wake Length: number of time steps the wake is retained in memory
wake_length = 100
relaxation = 0.1

[environment]
# Background wind vector (e.g., for crosswind simulations) [m/s]
wind_velocity = 0.0, 0.0, 0.0
air_density = 1.225
water_density = 1025.0

[vehicles]
# Number of vehicles in the simulation
number_of_vehicles = 2
vehicle_1 = airbus.ini
vehicle_2 = wig.ini