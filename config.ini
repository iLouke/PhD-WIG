# UVLM Configuration File
# Format: key = value
# Sections are enclosed in [brackets]

[logger]
# Logging configuration
enabled = .true.
level = 0
# 0=DEBUG, 1=INFO, 2=WARN, 3=ERROR
file = uvlm.log
console = .true.

[plotter]
# Plotting and visualization configuration
enabled = .true.
format = png
# Supported: png, pdf, eps
output_dir = output

[solver]
# UVLM solver configuration
max_iterations = 100
convergence_tol = 1.0e-4
relaxation = 0.1

[mesh]
# Mesh input files and generation parameters
# If mesh_file is specified, it overrides parametric mesh generation
points_file = points.dat
panels_file = panels.dat
# Parametric mesh generation (used only if mesh_file is empty)
chord = 1.0
half_span = 4.0
n_chordwise = 4
n_spanwise = 8

[simulation]
# General simulation parameters
velocity_inf = 10.0
angle_of_attack = 5.0
use_svd_fallback = .false.
