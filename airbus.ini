# ======================================================================
# WIG Lead Vehicle Configuration
# ======================================================================

[mesh]
# Mesh input files
points_file = points.dat
panels_file = panels.dat
# Center of Gravity (x, y, z) [m]
COG = 2.0, 0.0, 0.5
# Center of Pressure (x, y, z) [m]
COP = 1.8, 0.0, 0.3
# Center of Buoyancy (x, y, z) [m]
COB = 2.0, 0.0, -0.2
# Aerodynamic reference parameters
mac = 3.5
ar = 6.0
wing_area = 30.0

[mass_properties]
# Vehicle mass [kg]
mass = 5000.0
# Moments of inertia about COG (Ixx, Iyy, Izz) [kg*m^2]
inertia = 8000.0, 12000.0, 18000.0
# Products of inertia (Ixy, Ixz, Iyz) [kg*m^2]
products_of_inertia = 0.0, 200.0, 0.0

[kinematics]
# dynamics = T -> RK4 integration from ICs in flight_profile (must be 1 row)
# dynamics = F -> prescribed trajectory from flight_profile (multi-row)
dynamics = F
flight_profile = airbus_profile.csv

[freestream]
# Initial freestream conditions
velocity = 30.0
alpha = 5.0
beta = 0.0
altitude = 2.0

# ======================================================================
# Section / Control Surface Definitions
# ======================================================================
# id: Maps to the section flag in the panels.dat file
# symmetry: T/F (if T, the mesh is mirrored across the XZ plane)
# side: L/R/S (Left, Right, Symmetric)

[section.fuselage]
id = 0
symmetry = T

[section.wing]
id = 1
symmetry = T

[section.horizontal_tail]
id = 2
symmetry = T

[section.vertical_tail]
id = 3
symmetry = F
side = S

[section.aileron_left]
id = 4
side = L
# Hinge line definition: origin point + unit direction vector
hinge_point = 4.5, -3.0, 0.1
hinge_axis  = 0.0, 1.0, 0.0
deflection_type = file
deflection_data = aileron_left_schedule.csv

[section.aileron_right]
id = 5
side = R
hinge_point = 4.5, 3.0, 0.1
hinge_axis  = 0.0, 1.0, 0.0
deflection_type = file
deflection_data = aileron_right_schedule.csv

[section.elevator]
id = 6
symmetry = T
hinge_point = 8.0, 0.0, 0.4
hinge_axis  = 0.0, 1.0, 0.0
deflection_type = constant
deflection_data = -5.0